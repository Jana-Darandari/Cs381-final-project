<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Bubble Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header container">
    <a href="index.html" class="brand">🔵 Marketplace</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link" id="nav-index">Home</a>
      <a href="add-product.html" class="nav-link logged-in-only" id="nav-add">Sell Item</a>
      <a href="my-listings.html" class="nav-link logged-in-only" id="nav-mine">My Listings</a>
      <a href="admin-panel.html" class="nav-link admin-only" id="nav-admin">Admin</a>
      <a href="login.html" class="nav-link guest-only" id="nav-login">Login</a>
      <a href="#" id="logoutBtn" class="nav-link logged-in-only">Logout</a>
    </nav>
  </header>

  <main class="container" style="max-width: 500px; margin-top: 60px;">
    <div class="card" style="padding: 40px;">
      <h2 style="color: var(--bubble-blue); text-align: center; margin-top: 0; font-size: 2rem;">Welcome Back</h2>
      <p style="text-align: center; opacity: 0.7; margin-bottom: 30px;">Choose your role and sign in.</p>

      <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <button id="studentRoleBtn" class="role-btn active" type="button">Student</button>
        <button id="adminRoleBtn" class="role-btn" type="button">Admin</button>
      </div>

      <form id="loginForm" style="display: grid; gap: 20px;">
        <div>
          <label style="font-weight: 700; margin-bottom: 8px; display: block;">Email</label>
          <input type="email" placeholder="example@email.com" required class="bubble-input" />
        </div>
        <div>
          <label style="font-weight: 700; margin-bottom: 8px; display: block;">Password</label>
          <input type="password" placeholder="••••••••" required class="bubble-input" />
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px; font-size: 1.1rem;">Sign In</button>
      </form>
    </div>
  </main>

  <footer class="footer"><p>© 2026 Bubble Campus Marketplace</p></footer>

  <script src="script.js"></script>
</body>
</html>
