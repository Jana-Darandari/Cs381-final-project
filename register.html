<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Bubble Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header container">
    <a href="index.html" class="brand">🔵 Marketplace</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link" id="nav-index">Home</a>
      <a href="messages.html" class="nav-link logged-in-only" id="nav-messages">Inbox</a>
      <a href="add-product.html" class="nav-link logged-in-only" id="nav-add">Sell Item</a>
      <a href="my-listings.html" class="nav-link logged-in-only" id="nav-mine">My Listings</a>
      <a href="admin-panel.html" class="nav-link admin-only" id="nav-admin">Admin</a>
      <a href="login.html" class="nav-link guest-only" id="nav-login">Login</a>
      <a href="register.html" class="nav-link guest-only" id="nav-register">Register</a>
      <a href="#" id="logoutBtn" class="nav-link logged-in-only">Logout</a>
    </nav>
  </header>

  <main class="container" style="max-width: 500px; margin-top: 60px;">
    <div class="card" style="padding: 40px;">
      <h2 style="color: var(--bubble-blue); text-align: center; margin-top: 0;">Create Account</h2>
      
      <form id="registerForm" style="display: grid; gap: 20px;">
        <div>
          <label style="font-weight: 700; margin-bottom: 8px; display: block;">Email</label>
          <input type="email" id="regEmail" placeholder="student@campus.edu" required class="bubble-input" />
        </div>
        <div>
          <label style="font-weight: 700; margin-bottom: 8px; display: block;">Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required class="bubble-input" minlength="6" />
        </div>
        <div>
          <label style="font-weight: 700; margin-bottom: 8px; display: block;">Role</label>
          <select id="regRole" class="bubble-input">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign Up</button>
      </form>
      <p style="text-align: center; margin-top: 20px;"><a href="login.html" style="color: var(--bubble-blue); font-weight: 600;">Already have an account? Login</a></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
